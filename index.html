<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UT - Shop Registration</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.1/dist/browser-image-compression.js"></script>

  <style>
    body { background-color: #f4f6f4; font-family: sans-serif; }
    .header { background: #198754; color: white; padding: 15px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; gap: 15px; }
    .search-card { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); max-width: 600px; margin: 30px auto; border-top: 4px solid #198754; }
  </style>
</head>
<body>

  <div class="header mb-4">
    <img src="https://zdifzvpjmmmsfitjsraw.supabase.co/storage/v1/object/public/Logo/UT%20Logo.png" alt="Logo" style="height: 45px; width: auto; object-fit: contain; flex-shrink: 0;">
    <div class="text-start">
      <h4 class="m-0 fw-bold">Universal Tractor Co., Ltd.</h4>
      <small style="opacity: 0.9;">Shop Registration System</small>
    </div>
  </div>

  <div class="container px-3">
    <div class="search-card">
      <h5 class="fw-bold mb-4 text-center text-success">New Shop Registration</h5>
      
      <div class="mb-3">
        <label class="form-label small fw-bold">Data Collector Name</label>
        <select id="collectorName" class="form-select border-success">
          <option value="">-- Select Name --</option>
          <option value="Aung Aung">Aung Aung</option>
          <option value="Maung Maung">Maung Maung</option>
          <option value="Kyaw Kyaw">Kyaw Kyaw</option>
          <option value="Su Su">Su Su</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label small fw-bold">Shop Name</label>
        <input type="text" id="shopName" class="form-control form-control-lg" placeholder="Enter shop name">
      </div>

      <div class="row">
        <div class="col-md-4 mb-3">
          <label class="form-label small fw-bold">Size</label>
          <select id="shopSize" class="form-select">
            <option value="Small">Small</option>
            <option value="Medium">Medium</option>
            <option value="Large">Large</option>
          </select>
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label small fw-bold">Type</label>
          <select id="shopType" class="form-select">
            <option value="Battery">Battery</option>
            <option value="Tyre">Tyre</option>
            <option value="Lube">Lube</option>
          </select>
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label small fw-bold">Connection</label>
          <select id="shopConn" class="form-select">
            <option value="Old">Old</option>
            <option value="New">New</option>
          </select>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label small fw-bold">Shop Photo (Camera or Gallery)</label>
        <input type="file" id="shopPhoto" class="form-control" accept="image/*">
      </div>

      <button class="btn btn-success btn-lg w-100 fw-bold shadow-sm" onclick="submitShop()">
        🚀 Submit Registration
      </button>

      <a href="dashboard.html" class="btn btn-outline-secondary w-100 mt-3 fw-bold">📊 Go to Dashboard</a>
    </div>
      <p class="text-center text-muted mt-4" style="font-size: 0.75rem;">Developed by Universal Tractor Co., Ltd.</p>
  </div>

  <script>
    // ⚠️ Project ID နဲ့ API Key ကို ပြန်ထည့်ပါ
    const supabaseUrl = 'https://zdifzvpjmmmsfitjsraw.supabase.co';
    const supabaseKey = 'sb_publishable_Eghy_AeArZhWU86ETOoWqg_FI8xXh9P';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

    async function submitShop() {
        const collector = document.getElementById('collectorName').value;
        const name = document.getElementById('shopName').value;
        const size = document.getElementById('shopSize').value;
        const type = document.getElementById('shopType').value;
        const conn = document.getElementById('shopConn').value;
        const fileInput = document.getElementById('shopPhoto').files[0];

        // 🌟 Collector Name မရွေးဘဲ တင်လို့မရအောင် တားထားသည်
        if (!collector || !name || !fileInput) {
            return Swal.fire('Error', 'Collector Name, Shop Name, and Photo are required!', 'error');
        }

        Swal.fire({ title: 'Compressing & Saving...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        try {
            const options = { maxSizeMB: 0.5, maxWidthOrHeight: 1024, useWebWorker: true };
            const compressedFile = await imageCompression(fileInput, options);

            const pos = await new Promise((res, rej) => {
                navigator.geolocation.getCurrentPosition(res, rej, { enableHighAccuracy: true });
            });

            const fileName = Date.now() + "_" + compressedFile.name.replace(/[^a-zA-Z0-9.\-_]/g, '');
            const { data: uploadData, error: uploadErr } = await supabaseClient.storage
                .from('shop_images') 
                .upload(fileName, compressedFile);
            
            if (uploadErr) throw uploadErr;
            
            const { data: urlData } = supabaseClient.storage.from('shop_images').getPublicUrl(fileName);

            // 🌟 Database ထဲသို့ collector_name ပါ ပေါင်းထည့်သည်
            const { error: dbErr } = await supabaseClient.from('shops_location').insert([{
                collector_name: collector,
                name: name, 
                size: size, 
                type: type, 
                connection: conn,
                photo_url: urlData.publicUrl,
                latitude: pos.coords.latitude,
                longitude: pos.coords.longitude
            }]);

            if (dbErr) throw dbErr;

            Swal.fire('Success', 'Shop registered successfully!', 'success').then(() => {
                document.getElementById('shopName').value = '';
                document.getElementById('shopPhoto').value = '';
                // Dropdown ကို မူလအတိုင်း ပြန်ထားချင်ရင် အောက်ကစာကြောင်းကို အဖွင့်ပေးပါ
                // document.getElementById('collectorName').value = '';
            });

        } catch (err) {
            console.error("Error details:", err);
            Swal.fire('Error', err.message || 'Something went wrong!', 'error');
        }
    }
  </script>
</body>
</html>
