<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UT - Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.1/dist/browser-image-compression.js"></script>

  <style>
    body { background-color: #f4f6f4; font-family: sans-serif; }
    .header { background: #198754; color: white; padding: 15px; text-align: center; display: flex; align-items: center; justify-content: center; gap: 15px; }
    .status-active { background-color: #d1e7dd; color: #0f5132; }
    .status-inactive { background-color: #f8d7da; color: #842029; }
    .profile-img { width: 100%; height: 250px; object-fit: cover; border-radius: 8px; }
  </style>
</head>
<body onload="initMap()">

  <div class="header mb-4">
    <img src="https://zdifzvpjmmmsfitjsraw.supabase.co/storage/v1/object/public/Logo/UT%20Logo.png" alt="Logo" style="height: 45px; width: auto; object-fit: contain; flex-shrink: 0;">
    <div class="text-start">
      <h4 class="m-0 fw-bold">Universal Tractor Co., Ltd.</h4>
      <small style="opacity: 0.9;">Shops Location Dashboard</small>
    </div>
  </div>

  <div class="container px-3">
    <div class="row g-2 mb-4 p-3 bg-white rounded shadow-sm align-items-end border-top border-success border-3">
      <div class="col-md-2">
        <label class="form-label small fw-bold text-success">Shop Name</label>
        <select id="fName" class="form-select" onchange="loadDashboard()"><option value="">All Shops</option></select>
      </div>
       <div class="col-md-2">
        <label class="form-label small fw-bold text-success">Size</label>
        <select id="fSize" class="form-select" onchange="loadDashboard()">
          <option value="">All Sizes</option>
          <option value="Small">Small</option>
          <option value="Medium">Medium</option>
          <option value="Large">Large</option>
        </select>
      </div>
      <div class="col-md-2">
        <label class="form-label small fw-bold text-success">Status</label>
        <select id="fStatus" class="form-select" onchange="loadDashboard()">
          <option value="">All Status</option>
          <option value="Active">Active</option>
          <option value="Inactive">Inactive</option>
        </select>
      </div>
      <div class="col-md-2">
        <label class="form-label small fw-bold text-success">Type</label>
        <select id="fType" class="form-select" onchange="loadDashboard()">
          <option value="">All Types</option><option value="Battery">Battery</option><option value="Car Workshop">Car Workshop</option><option value="Building Material">Building Material</option>
        </select>
      </div>
      <div class="col-md-2">
        <label class="form-label small fw-bold text-success">Connection</label>
        <select id="fConn" class="form-select" onchange="loadDashboard()">
          <option value="">All</option>
          <option value="Old">Old</option>
            <option value="Current">Current</option>
	    <option value="Engaged">Engaged</option>
            <option value="New">New</option>
        </select>
      </div>
      <div class="col-md-6 text-end">
        <a href="index.html" class="btn btn-success fw-bold">➕ Add New Shop</a>
      </div>
    </div>

    <div id="map" class="bg-white p-2 rounded shadow-sm mb-4" style="height: 400px;"></div>

    <div class="table-responsive bg-white rounded shadow-sm p-3 mb-5">
      <table class="table table-hover align-middle">
        <thead class="table-success">
          <tr>
            <th>Photo</th><th>Name</th><th>Status</th><th>Size</th><th>Type</th><th>Action</th>
          </tr>
        </thead>
        <tbody id="shopTableBody"></tbody>
      </table>
    </div>
  </div>

  <div class="modal fade" id="profileModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow">
        <div class="modal-header bg-success text-white">
          <h5 class="modal-title fw-bold" id="pName">Shop Profile</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body text-center">
          <img id="pPhoto" src="" class="profile-img mb-3" alt="Shop Photo">
          <h4 id="pTitle" class="fw-bold text-success mb-3"></h4>
          
          <div class="row text-start g-2 px-3">
            <div class="col-6"><p class="mb-1"><strong>📏 Size:</strong> <span id="pSize"></span></p></div>
            <div class="col-6"><p class="mb-1"><strong>🏷️ Type:</strong> <span id="pType"></span></p></div>
            <div class="col-6"><p class="mb-1"><strong>🔗 Conn:</strong> <span id="pConn"></span></p></div>
            <div class="col-6"><p class="mb-1"><strong>📍 Lat/Lng:</strong> <span id="pGeo" style="font-size:0.8rem;"></span></p></div>
			<div class="col-12 mt-2 pt-2 border-top">    <p class="mb-1 text-muted small"><strong>📝 Data Collected By:</strong> <span id="pCollector" class="text-dark fw-bold"></span></p></div>
          </div>
          
          <a id="pMapLink" href="#" target="_blank" class="btn btn-primary w-100 mt-4 fw-bold">🧭 Get Location</a>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow">
        <div class="modal-header bg-primary text-white"><h5 class="modal-title fw-bold">Edit Shop</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label small fw-bold">Shop Name</label>
            <input type="text" id="editName" class="form-control">
          </div>
          <div class="mb-3">
            <div class="form-check form-switch p-0 ps-5">
              <input class="form-check-input" type="checkbox" id="editStatus">
              <label class="form-check-label fw-bold text-primary" for="editStatus">Active / Inactive Toggle</label>
            </div>
          </div>
          <div class="row">
            <div class="col-6 mb-3">
                <label class="form-label small fw-bold">Size</label>
                <select id="editSize" class="form-select"><option value="Small">Small</option><option value="Medium">Medium</option><option value="Large">Large</option></select>
            </div>
            <div class="col-6 mb-3">
                <label class="form-label small fw-bold">Type</label>
                <select id="editType" class="form-select"><option value="Battery">Battery</option><option value="Car Workshop">Car Workshop</option><option value="Building Material">Building Material</option></select>
            </div>
          </div>
          <div class="mb-3"><label class="form-label small fw-bold">Update Photo</label><input type="file" id="editPhoto" class="form-control"></div>
          <button class="btn btn-primary w-100 fw-bold" onclick="saveEdit()">💾 Save Changes</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const supabaseUrl = 'https://zdifzvpjmmmsfitjsraw.supabase.co';
    const supabaseKey = 'sb_publishable_Eghy_AeArZhWU86ETOoWqg_FI8xXh9P';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

    let map, markers = [], allShopsData = [], currentEditId = null, currentEditPhotoUrl = "";

    function initMap() {
        map = L.map('map').setView([16.8409, 96.1735], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
        loadDashboard();
    }

    async function loadDashboard() {
        let query = supabaseClient.from('shops_location').select('*');
        const nameF = document.getElementById('fName').value;
        const statusF = document.getElementById('fStatus').value;
        if (nameF) query = query.eq('name', nameF);
        if (statusF) query = query.eq('status', statusF);

        const { data } = await query;
        allShopsData = data || [];
        let html = '';
        markers.forEach(m => map.removeLayer(m));
        markers = [];

        allShopsData.forEach((shop, index) => {
            const statusBadge = shop.status === 'Active' ? 'badge status-active' : 'badge status-inactive';
            html += `<tr>
              <td><img src="${shop.photo_url}" width="50" height="50" style="object-fit:cover; border-radius:6px;"></td>
              <td class="fw-bold">${shop.name}</td>
              <td><span class="${statusBadge}">${shop.status || 'Active'}</span></td>
              <td>${shop.size}</td>
              <td>${shop.type}</td>
              <td>
                <button class="btn btn-sm btn-outline-primary" onclick="openEdit(${index})">✏️ Edit</button>
              </td>
            </tr>`;
            
            const marker = L.marker([shop.latitude, shop.longitude]).bindPopup(shop.name).addTo(map);
            markers.push(marker);
        });
        document.getElementById('shopTableBody').innerHTML = html;
    }

	function openProfile(index) {
        const shop = allShopsData[index];
        document.getElementById('pTitle').innerText = shop.name;
        document.getElementById('pPhoto').src = shop.photo_url;
        document.getElementById('pSize').innerText = shop.size;
        document.getElementById('pType').innerText = shop.type;
        document.getElementById('pConn').innerText = shop.connection;
        document.getElementById('pGeo').innerText = parseFloat(shop.latitude).toFixed(4) + ", " + parseFloat(shop.longitude).toFixed(4);
        document.getElementById('pCollector').innerText = shop.collector_name || "-";
        document.getElementById('pMapLink').href = `https://www.google.com/maps?q=${shop.latitude},${shop.longitude}`;
        
        const modal = new bootstrap.Modal(document.getElementById('profileModal'));
        modal.show();
    }
	  
    function openEdit(index) {
        const shop = allShopsData[index];
        currentEditId = shop.id;
        currentEditPhotoUrl = shop.photo_url;
        document.getElementById('editName').value = shop.name;
        document.getElementById('editStatus').checked = (shop.status !== 'Inactive');
        document.getElementById('editSize').value = shop.size;
        document.getElementById('editType').value = shop.type;
        new bootstrap.Modal(document.getElementById('editModal')).show();
    }

    async function saveEdit() {
        const name = document.getElementById('editName').value;
        const status = document.getElementById('editStatus').checked ? 'Active' : 'Inactive';
        const size = document.getElementById('editSize').value;
        const type = document.getElementById('editType').value;
        const file = document.getElementById('editPhoto').files[0];

        Swal.fire({ title: 'Updating...', didOpen: () => Swal.showLoading() });

        let photoUrl = currentEditPhotoUrl;
        if (file) {
            const compressedFile = await imageCompression(file, { maxSizeMB: 0.5 });
            const fileName = Date.now() + "_" + file.name;
            await supabaseClient.storage.from('shop_images').upload(fileName, compressedFile);
            photoUrl = supabaseClient.storage.from('shop_images').getPublicUrl(fileName).data.publicUrl;
        }

        const { error } = await supabaseClient.from('shops_location').update({
            name, status, size, type, photo_url: photoUrl
        }).eq('id', currentEditId);

        if (!error) {
            Swal.fire('Updated!', '', 'success').then(() => {
                bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
                loadDashboard();
            });
        }
    }
  </script>
</body>
</html>
