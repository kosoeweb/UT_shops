<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UT - Dashboard</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    /* 🌟 Green Theme */
    body { background-color: #f4f6f4; font-family: sans-serif; }
    .header { background: #198754; color: white; padding: 15px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; gap: 15px; }
    .table-success th { background-color: #d1e7dd !important; }
    .profile-img { width: 100%; height: 250px; object-fit: cover; border-radius: 8px; border: 3px solid #198754; }
  </style>
</head>
<body onload="initMap()">

  <div class="header mb-4">
    <img src="https://zdifzvpjmmmsfitjsraw.supabase.co/storage/v1/object/public/Logo/UT%20Logo.png" alt="Logo" style="height: 45px; width: auto; object-fit: contain; flex-shrink: 0;">
    <div class="text-start">
      <h4 class="m-0 fw-bold">Universal Tractor Co., Ltd.</h4>
      <small style="opacity: 0.9;">Shops Location Dashboard</small>
    </div>
  </div>

  <div class="container px-3">
    <div class="row g-2 mb-4 p-3 bg-white rounded shadow-sm align-items-end border-top border-success border-3">
      <div class="col-md-2">
        <label class="form-label small fw-bold text-success">Shop Name</label>
        <select id="fName" class="form-select" onchange="loadDashboard()">
          <option value="">All Shops</option>
          </select>
      </div>
      <div class="col-md-2">
        <label class="form-label small fw-bold text-success">Size</label>
        <select id="fSize" class="form-select" onchange="loadDashboard()">
          <option value="">All Sizes</option>
          <option value="Small">Small</option>
          <option value="Medium">Medium</option>
          <option value="Large">Large</option>
        </select>
      </div>
      <div class="col-md-2">
        <label class="form-label small fw-bold text-success">Type</label>
        <select id="fType" class="form-select" onchange="loadDashboard()">
          <option value="">All Types</option>
          <option value="Battery">Battery</option>
          <option value="Car Workshop">Car Workshop</option>
            <option value="Building Material">Building Material</option>
        </select>
      </div>
      <div class="col-md-2">
        <label class="form-label small fw-bold text-success">Connection</label>
        <select id="fConn" class="form-select" onchange="loadDashboard()">
          <option value="">All</option>
          <option value="Old">Old</option>
            <option value="Current">Current</option>
	    <option value="Engaged">Engaged</option>
            <option value="New">New</option>
        </select>
      </div>
      <div class="col-md-4 text-end">
        <a href="index.html" class="btn btn-outline-success fw-bold w-100">➕ Add New Shop</a>
      </div>
    </div>

    <div class="bg-white p-2 rounded shadow-sm mb-4 border border-light">
      <div id="map" style="height: 450px; width: 100%; border-radius: 8px; z-index: 1;"></div>
    </div>

    <div class="table-responsive bg-white rounded shadow-sm p-3 mb-5">
      <table class="table table-hover align-middle">
        <thead class="table-success">
          <tr>
            <th>Photo</th>
            <th>Shop Name</th>
            <th>Size</th>
            <th>Type</th>
            <th>Conn</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="shopTableBody">
          </tbody>
      </table>
    </div>
  </div>

  <div class="modal fade" id="profileModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow">
        <div class="modal-header bg-success text-white">
          <h5 class="modal-title fw-bold" id="pName">Shop Profile</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body text-center">
          <img id="pPhoto" src="" class="profile-img mb-3" alt="Shop Photo">
          <h4 id="pTitle" class="fw-bold text-success mb-3"></h4>
          
          <div class="row text-start g-2 px-3">
            <div class="col-6"><p class="mb-1"><strong>📏 Size:</strong> <span id="pSize"></span></p></div>
            <div class="col-6"><p class="mb-1"><strong>🏷️ Type:</strong> <span id="pType"></span></p></div>
            <div class="col-6"><p class="mb-1"><strong>🔗 Conn:</strong> <span id="pConn"></span></p></div>
            <div class="col-6"><p class="mb-1"><strong>📍 Lat/Lng:</strong> <span id="pGeo" style="font-size:0.8rem;"></span></p></div>
			<div class="col-12 mt-2 pt-2 border-top">    <p class="mb-1 text-muted small"><strong>📝 Data Collected By:</strong> <span id="pCollector" class="text-dark fw-bold"></span></p></div>
          </div>
          
          <a id="pMapLink" href="#" target="_blank" class="btn btn-primary w-100 mt-4 fw-bold">🧭 Get Location</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ⚠️ သင့်ရဲ့ Project ID နဲ့ API Key ကို အောက်မှာ ထည့်ပါ။
    const supabaseUrl = 'https://zdifzvpjmmmsfitjsraw.supabase.co';
    const supabaseKey = 'sb_publishable_Eghy_AeArZhWU86ETOoWqg_FI8xXh9P';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

    let map;
    let markers = []; 
    let allShopsData = []; // Data အားလုံးကို သိမ်းထားရန် (Profile အတွက်)

    async function initMap() {
        map = L.map('map').setView([16.8409, 96.1735], 12); 
        
        // 🌟 Blank Map ပြဿနာဖြေရှင်းရန် CartoDB Tile ကို ပြောင်းသုံးထားပါတယ် (ပိုမြန်ပြီး ဗြောင်မဖြစ်ပါ)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap, © CartoDB',
            maxZoom: 19
        }).addTo(map);

        await populateShopNames(); // Shop Name Filter အတွက် နာမည်တွေအရင်ယူမယ်
        loadDashboard(); 
    }

    // Filter Dropdown ထဲသို့ Shop Name များထည့်ခြင်း
    async function populateShopNames() {
        const { data } = await supabaseClient.from('shops_location').select('name').order('name');
        if(data) {
            let options = '<option value="">All Shops</option>';
            // နာမည်ထပ်နေတာတွေဖယ်ရှားရန် Set ကိုသုံးထားပါတယ်
            const uniqueNames = [...new Set(data.map(item => item.name))];
            uniqueNames.forEach(name => {
                options += `<option value="${name}">${name}</option>`;
            });
            document.getElementById('fName').innerHTML = options;
        }
    }

    async function loadDashboard() {
        let query = supabaseClient.from('shops_location').select('*');
        
        const nameFilter = document.getElementById('fName').value;
        const sizeFilter = document.getElementById('fSize').value;
        const typeFilter = document.getElementById('fType').value;
        const connFilter = document.getElementById('fConn').value;

        // 🌟 Filter အသစ်များ အလုပ်လုပ်ရန်
        if (nameFilter) query = query.eq('name', nameFilter);
        if (sizeFilter) query = query.eq('size', sizeFilter);
        if (typeFilter) query = query.eq('type', typeFilter);
        if (connFilter) query = query.eq('connection', connFilter);

        const { data, error } = await query;
        if(error) { console.error(error); return; }
        
        allShopsData = data; // Profile Modal တွက် သိမ်းထားခြင်း
        let html = '';
        
        markers.forEach(m => map.removeLayer(m));
        markers = [];

        data.forEach((shop, index) => {
            let googleMapLink = `https://www.google.com/maps?q=${shop.latitude},${shop.longitude}`;

            html += `<tr>
              <td><img src="${shop.photo_url}" width="50" height="50" style="object-fit: cover; border-radius: 6px; cursor:pointer;" onclick="openProfile(${index})"></td>
              <td class="fw-bold">${shop.name}</td>
              <td><span class="badge bg-secondary">${shop.size}</span></td>
              <td>${shop.type}</td>
              <td>${shop.connection}</td>
              <td>
                <button class="btn btn-sm btn-outline-success me-1" onclick="openProfile(${index})">👁️ Profile</button>
              </td>
            </tr>`;
            
            if(shop.latitude && shop.longitude && map) {
                const marker = L.marker([parseFloat(shop.latitude), parseFloat(shop.longitude)])
                                .bindPopup(`<b>${shop.name}</b><br><button class='btn btn-xs btn-success mt-1' onclick='openProfile(${index})'>View Profile</button>`)
                                .addTo(map);
                markers.push(marker);
            }
        });
        document.getElementById('shopTableBody').innerHTML = html;

        // Map ကို Data ရှိသလောက် အံဝင်ခွင်ကျဖြစ်အောင် Zoom ချိန်ခြင်း
        if (markers.length > 0) {
            const group = new L.featureGroup(markers);
            map.fitBounds(group.getBounds(), { padding: [50, 50] });
        }
        
        // 🌟 Map ဗြောင်ဖြစ်တာကို ကာကွယ်ရန် Size ပြန်ချိန်ပေးခြင်း
        setTimeout(() => { map.invalidateSize(); }, 400);
    }

    // 🌟 Profile Modal ဖွင့်ရန် Function
    function openProfile(index) {
        const shop = allShopsData[index];
        document.getElementById('pTitle').innerText = shop.name;
        document.getElementById('pPhoto').src = shop.photo_url;
        document.getElementById('pSize').innerText = shop.size;
        document.getElementById('pType').innerText = shop.type;
        document.getElementById('pConn').innerText = shop.connection;
        document.getElementById('pGeo').innerText = parseFloat(shop.latitude).toFixed(4) + ", " + parseFloat(shop.longitude).toFixed(4);
        document.getElementById('pCollector').innerText = shop.collector_name || "-";
        document.getElementById('pMapLink').href = `https://www.google.com/maps?q=${shop.latitude},${shop.longitude}`;
        
        const modal = new bootstrap.Modal(document.getElementById('profileModal'));
        modal.show();
    }
  </script>
</body>
</html>
